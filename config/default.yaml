config_version: "0.1.0"

universe:
  adv_min_inr_cr: 50
  price_min_inr: 50
  refresh: weekly

labels:
  top_quantile: 0.20
  bottom_quantile: 0.20
  horizon_primary: 5
  selection_policy: floor
  # pilot | l1_intersection | phase1_filters
  # pilot is NOT suitable for production benchmarking
  universe_mode: pilot
  label_source: price_return_v1
  # Pilot allow-list (docs/data/pilot_5_stocks). Empty = all L1 names, still tagged pilot.
  pilot_isins:
    - INE002A01018  # RELIANCE
    - INE467B01029  # TCS
    - INE009A01021  # INFY
    - INE040A01034  # HDFCBANK
    - INE090A01021  # ICICIBANK

output:
  top_n_longs: 20
  top_n_shorts: 20

modeling:
  horizon: 5
  risk_weight: 1.0
  embargo_sessions: 5
  min_train_sessions: 252
  test_fold_sessions: 21
  step_sessions: 21
  top_k: 20
  # Until features are promoted, research/paper may use experimental allow-list
  require_production_features: false
  model_name: cs_quantile_h5
  model_version: v1
  feature_set: core
  feature_version: v1
  label_set: core
  label_version: v1
  random_seed: 42
  # Conservative HGB defaults (research may override)
  learning_rate: 0.05
  max_depth: 4
  max_leaf_nodes: 31
  min_samples_leaf: 20
  l2_regularization: 1.0

# See docs/backtest/COST_SOURCES.md for statutory / exchange citations
backtest:
  top_k: 20
  capital_inr: 1000000
  costs:
    stt_rate: 0.001          # 0.10% delivery buy & sell (NSE STT schedule)
    stamp_duty_rate: 0.00015 # 0.015% buy (NSE stamp duty)
    exchange_txn_rate: 0.0000297  # 0.00297% / side (NSE cash FY25-26)
    sebi_rate: 0.000001      # ₹10/crore
    gst_rate: 0.18
    brokerage_rate: 0.0      # discount-broker delivery default
    dp_charge_inr: 15.34
    apply_dp_charges: true
    slippage_bps: 5.0        # liquid large-cap assumption (not statutory)

paths:
  data_root: data

ingest:
  row_count_deviation: 0.5
  provider: local_csv
  missing_session_lookback_n: 5
  outlier_abs_return: 0.5
  fail_on_outliers: false

schemas:
  equity_eod: v1
  corporate_actions: v1
  symbol_isin_map: v1
  trading_calendar: v1
