config_version: "0.1.0"

universe:
  adv_min_inr_cr: 50
  price_min_inr: 50
  refresh: weekly

labels:
  top_quantile: 0.20
  bottom_quantile: 0.20
  horizon_primary: 5
  selection_policy: floor
  # pilot | l1_intersection | phase1_filters
  # pilot is NOT suitable for production benchmarking
  universe_mode: pilot
  label_source: price_return_v1
  # Optional ISIN allow-list when universe_mode=pilot (empty = all L1 names)
  pilot_isins: []

output:
  top_n_longs: 20
  top_n_shorts: 20

paths:
  data_root: data

ingest:
  row_count_deviation: 0.5
  provider: local_csv
  missing_session_lookback_n: 5
  outlier_abs_return: 0.5
  fail_on_outliers: false

schemas:
  equity_eod: v1
  corporate_actions: v1
  symbol_isin_map: v1
  trading_calendar: v1
