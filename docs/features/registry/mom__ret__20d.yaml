name: mom__ret__20d
version: v1
family: momentum
feature_type: rolling
owner: stock-engine
description: >
  Twenty-trading-session simple return of adjusted close:
  close_adj[T] / close_adj[T-20] - 1, using open sessions on the
  canonical trading calendar. Depends on raw__close_adj__l1.
dtype: float
unit: return
dependencies:
  - feature:raw__close_adj__l1@v1
lookback_sessions: 20
pit_rule: asof_session_close
null_policy: propagate
lifecycle: experimental
validation:
  finite: true
  allow_null: true
recomputable: true
computational_cost: low
stability: experimental
