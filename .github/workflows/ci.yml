name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --frozen --extra dev
      - name: Ruff check
        run: uv run ruff check src tests scripts
      - name: Ruff format
        run: uv run ruff format --check src tests scripts
      - name: Lint feature registry
        run: uv run stock-engine-lint-features
      - name: Tests
        run: uv run pytest
